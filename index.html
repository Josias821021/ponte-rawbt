<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Ponte de Impressão · RawBT</title>
<style>
  :root {
    --bg: #0f1115;
    --card: #171a21;
    --border: #262b36;
    --text: #e8eaed;
    --muted: #8b93a3;
    --accent: #ff6a3d;
    --ok: #3ddc84;
    --err: #ff5470;
  }
  * { box-sizing: border-box; }
  body {
    margin: 0;
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    padding: 20px;
  }
  .wrap { max-width: 480px; margin: 0 auto; }
  h1 {
    font-size: 20px;
    font-weight: 700;
    margin: 0 0 4px;
    display: flex;
    align-items: center;
    gap: 8px;
  }
  .sub { color: var(--muted); font-size: 13px; margin-bottom: 20px; }

  .card {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 14px;
    padding: 16px;
    margin-bottom: 14px;
  }
  .card h2 {
    font-size: 13px;
    text-transform: uppercase;
    letter-spacing: 0.06em;
    color: var(--muted);
    margin: 0 0 12px;
  }

  label {
    display: block;
    font-size: 12px;
    color: var(--muted);
    margin: 10px 0 4px;
  }
  input[type=text], input[type=number] {
    width: 100%;
    background: #0d0f13;
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 10px 12px;
    color: var(--text);
    font-size: 14px;
  }
  input:focus { outline: none; border-color: var(--accent); }

  .status-row {
    display: flex;
    align-items: center;
    gap: 10px;
    margin-bottom: 4px;
  }
  .dot {
    width: 10px; height: 10px; border-radius: 50%;
    background: var(--muted);
    flex-shrink: 0;
    transition: background 0.2s;
  }
  .dot.on { background: var(--ok); box-shadow: 0 0 8px var(--ok); }
  .dot.off { background: var(--err); }
  .status-text { font-size: 14px; }
  .status-detail { font-size: 12px; color: var(--muted); margin-top: 2px; }

  button {
    border: none;
    border-radius: 10px;
    padding: 13px 16px;
    font-size: 15px;
    font-weight: 600;
    cursor: pointer;
    width: 100%;
  }
  .btn-primary { background: var(--accent); color: #1a0d07; }
  .btn-primary:disabled { opacity: 0.5; }
  .btn-secondary {
    background: transparent;
    border: 1px solid var(--border);
    color: var(--text);
    margin-top: 8px;
  }

  .log {
    max-height: 220px;
    overflow-y: auto;
    display: flex;
    flex-direction: column-reverse;
    gap: 6px;
  }
  .log-entry {
    font-size: 12px;
    padding: 8px 10px;
    border-radius: 8px;
    background: #0d0f13;
    border: 1px solid var(--border);
    color: var(--muted);
  }
  .log-entry.success { border-color: rgba(61,220,132,0.35); color: var(--ok); }
  .log-entry.error { border-color: rgba(255,84,112,0.35); color: var(--err); }

  .badge {
    display: inline-block;
    font-size: 11px;
    padding: 2px 8px;
    border-radius: 999px;
    background: rgba(255,106,61,0.15);
    color: var(--accent);
    margin-left: 6px;
  }

  .alert-card {
    display: none;
    background: var(--card);
    border: 2px solid var(--accent);
    border-radius: 14px;
    padding: 16px;
    margin-bottom: 14px;
    animation: pulse 1.1s infinite;
  }
  .alert-card h2 {
    font-size: 15px;
    color: var(--accent);
    margin: 0 0 10px;
    text-transform: none;
    letter-spacing: normal;
  }
  .alert-detail {
    font-size: 13px;
    color: var(--text);
    white-space: pre-line;
    margin-bottom: 14px;
    line-height: 1.5;
  }
  .btn-alert {
    background: var(--ok);
    color: #04150c;
    font-size: 17px;
    padding: 18px;
  }
  @keyframes pulse {
    0%, 100% { box-shadow: 0 0 0 0 rgba(255,106,61,0.5); }
    50% { box-shadow: 0 0 0 10px rgba(255,106,61,0); }
  }
</style>
</head>
<body>
<div class="wrap">
  <h1>🖨️ Ponte de Impressão <span class="badge">RawBT</span></h1>
  <div class="sub">Deixe esta página aberta no celular que tem o RawBT instalado. Ela fica checando novos pedidos no n8n e avisa quando chegar um novo.</div>

  <div class="alert-card" id="alertCard">
    <h2>🔔 Novo pedido chegou!</h2>
    <div class="alert-detail" id="alertDetail"></div>
    <button class="btn-alert" id="btnImprimirAgora">🖨️ Imprimir pedido</button>
  </div>

  <div class="card">
    <h2>Configuração</h2>
    <label>URL base do n8n (webhook)</label>
    <input type="text" id="baseUrl" placeholder="https://cheapguppy-n8n.cloudfy.live/webhook">
    <label>Intervalo de checagem (segundos)</label>
    <input type="number" id="interval" value="5" min="2" max="60">
    <button class="btn-primary" id="btnStart">Iniciar monitoramento</button>
    <button class="btn-secondary" id="btnStop" disabled>Parar</button>
  </div>

  <div class="card">
    <h2>Status</h2>
    <div class="status-row">
      <div class="dot" id="dot"></div>
      <div>
        <div class="status-text" id="statusText">Parado</div>
        <div class="status-detail" id="statusDetail">Configure a URL e clique em iniciar</div>
      </div>
    </div>
    <button class="btn-secondary" id="btnReprint" disabled>Reimprimir último pedido</button>
  </div>

  <div class="card">
    <h2>Atividade recente</h2>
    <div class="log" id="log"></div>
  </div>
</div>

<script>
let polling = false;
let timer = null;
let reminderTimer = null;
let lastPrinted = null;
let pendingOrder = null;

const el = {
  baseUrl: document.getElementById('baseUrl'),
  interval: document.getElementById('interval'),
  btnStart: document.getElementById('btnStart'),
  btnStop: document.getElementById('btnStop'),
  btnReprint: document.getElementById('btnReprint'),
  dot: document.getElementById('dot'),
  statusText: document.getElementById('statusText'),
  statusDetail: document.getElementById('statusDetail'),
  log: document.getElementById('log'),
  alertCard: document.getElementById('alertCard'),
  alertDetail: document.getElementById('alertDetail'),
  btnImprimirAgora: document.getElementById('btnImprimirAgora'),
};

function addLog(message, type) {
  const entry = document.createElement('div');
  entry.className = 'log-entry' + (type ? ' ' + type : '');
  const time = new Date().toLocaleTimeString('pt-BR');
  entry.textContent = '[' + time + '] ' + message;
  el.log.appendChild(entry);
  while (el.log.children.length > 30) el.log.removeChild(el.log.firstChild);
}

function setStatus(state, text, detail) {
  el.dot.className = 'dot' + (state ? ' ' + state : '');
  el.statusText.textContent = text;
  el.statusDetail.textContent = detail || '';
}

// Impressoras térmicas ESC/POS esperam Latin-1 (ISO-8859-1), não UTF-8.
// Convertendo dessa forma, acentos como á, é, ã saem corretos no papel.
function utf8ToBase64(str) {
  try {
    return btoa(str);
  } catch (e) {
    // Se tiver algum caractere fora do intervalo Latin-1, substitui por "?"
    return btoa(str.replace(/[^\x00-\xFF]/g, '?'));
  }
}

// Aciona o RawBT via esquema de URL. Isso exige um toque real do usuário
// (gesto), por isso NUNCA é chamado automaticamente pelo timer — só pelo
// clique no botão "Imprimir pedido" ou "Reimprimir último pedido".
function acionarRawbt(texto) {
  const init = '\x1B\x40';       // ESC @ (reset)
  const corte = '\x1D\x56\x00';  // GS V 0 (corte total)
  const conteudo = init + texto + '\n\n\n' + corte;
  const base64 = utf8ToBase64(conteudo);
  window.location.href = 'rawbt:base64,' + base64;
}

// Toca um beep usando Web Audio API (não depende de nenhum arquivo externo).
function playAlertSound() {
  try {
    const ctx = new (window.AudioContext || window.webkitAudioContext)();
    const playBeep = (delay) => {
      setTimeout(() => {
        const osc = ctx.createOscillator();
        const gain = ctx.createGain();
        osc.type = 'square';
        osc.frequency.value = 880;
        gain.gain.value = 0.15;
        osc.connect(gain);
        gain.connect(ctx.destination);
        osc.start();
        osc.stop(ctx.currentTime + 0.18);
      }, delay);
    };
    playBeep(0);
    playBeep(250);
  } catch (e) {
    // Se o navegador bloquear áudio automático, ignora silenciosamente.
  }
}

function mostrarAlerta(data) {
  el.alertDetail.textContent = data.texto;
  el.alertCard.style.display = 'block';
}

function esconderAlerta() {
  el.alertCard.style.display = 'none';
  el.alertDetail.textContent = '';
}

async function checarPedidoPendente() {
  const base = el.baseUrl.value.replace(/\/$/, '');
  try {
    const resp = await fetch(base + '/fila-impressao/proximo', { cache: 'no-store' });
    if (!resp.ok) throw new Error('HTTP ' + resp.status);
    const data = await resp.json();

    if (data && data.found) {
      if (!pendingOrder || pendingOrder.id !== data.id) {
        pendingOrder = data;
        addLog('Novo pedido encontrado (id: ' + data.id + '). Toque em "Imprimir pedido".', 'success');
        mostrarAlerta(data);
        playAlertSound();
        if (navigator.vibrate) navigator.vibrate([200, 100, 200, 100, 200]);

        // Lembrete: repete o som a cada 15s enquanto o pedido não for impresso,
        // pra garantir que ninguém deixe passar despercebido.
        clearInterval(reminderTimer);
        reminderTimer = setInterval(() => {
          if (pendingOrder) {
            playAlertSound();
            if (navigator.vibrate) navigator.vibrate([200, 100, 200]);
          }
        }, 15000);
      }
      setStatus('on', 'Pedido aguardando impressão', 'Pedido ' + data.id);
    } else {
      if (pendingOrder) {
        pendingOrder = null;
        esconderAlerta();
        clearInterval(reminderTimer);
      }
      setStatus('on', 'Monitorando', 'Nenhum pedido pendente · ' + new Date().toLocaleTimeString('pt-BR'));
    }
  } catch (err) {
    setStatus('off', 'Erro de conexão', err.message);
    addLog('Erro ao checar fila: ' + err.message, 'error');
  }
}

el.btnImprimirAgora.addEventListener('click', async () => {
  if (!pendingOrder) return;
  const base = el.baseUrl.value.replace(/\/$/, '');
  const order = pendingOrder;

  acionarRawbt(order.texto);
  addLog('Pedido ' + order.id + ' enviado para impressão.', 'success');

  try {
    await fetch(base + '/fila-impressao/marcar-impresso', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ id: order.id })
    });
    addLog('Pedido ' + order.id + ' marcado como impresso.', 'success');
  } catch (err) {
    addLog('Falha ao marcar pedido ' + order.id + ' como impresso: ' + err.message, 'error');
  }

  lastPrinted = order;
  el.btnReprint.disabled = false;
  pendingOrder = null;
  esconderAlerta();
  clearInterval(reminderTimer);
  setStatus('on', 'Monitorando', 'Nenhum pedido pendente · ' + new Date().toLocaleTimeString('pt-BR'));
});

el.btnStart.addEventListener('click', () => {
  if (!el.baseUrl.value.trim()) {
    addLog('Informe a URL base do n8n antes de iniciar.', 'error');
    return;
  }
  polling = true;
  el.btnStart.disabled = true;
  el.btnStop.disabled = false;
  el.baseUrl.disabled = true;
  el.interval.disabled = true;
  addLog('Monitoramento iniciado.');
  setStatus('on', 'Monitorando', 'Iniciando...');
  checarPedidoPendente();
  const seconds = Math.max(2, parseInt(el.interval.value, 10) || 5);
  timer = setInterval(checarPedidoPendente, seconds * 1000);
});

el.btnStop.addEventListener('click', () => {
  polling = false;
  clearInterval(timer);
  clearInterval(reminderTimer);
  el.btnStart.disabled = false;
  el.btnStop.disabled = true;
  el.baseUrl.disabled = false;
  el.interval.disabled = false;
  setStatus('', 'Parado', 'Monitoramento pausado');
  addLog('Monitoramento parado.');
});

el.btnReprint.addEventListener('click', () => {
  if (!lastPrinted) return;
  addLog('Reimprimindo pedido ' + lastPrinted.id + '...');
  acionarRawbt(lastPrinted.texto);
});
</script>
</body>
</html>
